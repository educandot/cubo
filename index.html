<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cubo 3x3x3 com Arestas Pretas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050b1a;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        window.addEventListener('load', function() {
            // ConfiguraĂ§Ă£o da cena
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);

            // CĂ¢mera
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4, 3, 5);
            camera.lookAt(0, 0, 0);

            // Renderizador
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Controles do mouse
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 1.5;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.target.set(0, 0, 0);

            // Luz ambiente
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
       

            // ============================================
            // CRIAĂ‡ĂƒO DO CUBO 3x3x3 COM MAIS ESPAĂ‡AMENTO
            // ============================================
            const cubeGroup = new THREE.Group();
            
            const mainSize = 2.4;
            const segmentSize = mainSize / 3;
            const gap = 0.12; // EspaĂ§amento entre os cubos
            
            // Material branco para os cubos
            const whiteMat = new THREE.MeshStandardMaterial({
                color: 0xf0f0f0,
                metalness: 0,
                roughness: 0.8
            });
            
            // Material para as arestas pretas
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
            
            // Tamanho de cada cubo (menor para criar o espaĂ§amento)
            const cubeSize = segmentSize - gap;
            
            // Criar os 27 cubos com arestas pretas e espaĂ§amento
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        // Criar o cubo
                        const boxGeo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                        const smallCube = new THREE.Mesh(boxGeo, whiteMat.clone());
                        smallCube.position.set(x * segmentSize, y * segmentSize, z * segmentSize);
                        cubeGroup.add(smallCube);
                        
                        // Adicionar arestas pretas em volta do cubo
                        const edgesGeo = new THREE.EdgesGeometry(boxGeo);
                        const wireframe = new THREE.LineSegments(edgesGeo, edgeMaterial);
                        smallCube.add(wireframe);
                    }
                }
            }
            
            scene.add(cubeGroup);
            
            // ============================================
            // ANIMAĂ‡ĂƒO
            // ============================================
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
            
            // ============================================
            // AJUSTE DE TAMANHO DA JANELA
            // ============================================
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            console.log('Cubo 3x3x3 com mais espaĂ§amento carregado!');
        });
    </script>
</body>
</html>
